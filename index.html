<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JLPT">
<meta name="theme-color" content="#1a1320">
<title>JLPT Study</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%237F77DD'/%3E%3Ctext x='90' y='118' font-size='80' font-family='sans-serif' font-weight='700' fill='white' text-anchor='middle'%3E語%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#1a1320;
  --surface:#241a2e;
  --surface-2:#2e2239;
  --border:#3a2d47;
  --border-soft:#332840;
  --text:#f0e9f5;
  --text-dim:#a99cb8;
  --text-faint:#6f6280;
  --accent:#b3a4ff;
  --radius:16px;
  --radius-sm:10px;
  --n5:#8b7ff0;
  --n4:#34c08a;
  --n3:#e8794a;
  --n2:#e06363;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Helvetica Neue",sans-serif;
  font-size:16px;
  line-height:1.5;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  overscroll-behavior:none;
}
.wrap{max-width:560px;margin:0 auto;padding:12px 14px;min-height:100%;height:100%;display:flex;flex-direction:column}
body.playing #top-chrome,body.playing .foot{display:none}

/* Header */
.app-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
.app-title{font-size:19px;font-weight:700;letter-spacing:-0.02em}
.app-title span{color:var(--accent)}
.app-tag{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.08em}

/* Level row */
.levels{display:flex;gap:8px;margin-bottom:0}
.level{
  flex:1;padding:10px 0;border-radius:var(--radius-sm);border:1.5px solid var(--border);
  background:transparent;color:var(--text-dim);font-size:15px;font-weight:700;cursor:pointer;
  transition:all .15s;font-family:inherit;
}
.level[data-level="N5"].on{background:var(--n5);border-color:var(--n5);color:#fff}
.level[data-level="N4"].on{background:var(--n4);border-color:var(--n4);color:#fff}
.level[data-level="N3"].on{background:var(--n3);border-color:var(--n3);color:#fff}
.level[data-level="N2"].on{background:var(--n2);border-color:var(--n2);color:#fff}

/* Category chips */
.cats{display:flex;gap:7px;margin:0 0 4px;flex-wrap:wrap;justify-content:center}
.cat{
  padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;
  color:var(--text-dim);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;
}
.cat.on{background:var(--surface-2);color:var(--text);border-color:var(--accent)}

/* Start-screen summary */
.m-summary{font-size:12px;color:var(--text-dim);margin:14px 0 4px;line-height:1.7}
.m-summary b{color:var(--text)}
.m-summary .stars{color:#f5c451}
.m-prog-bar{height:6px;background:var(--surface-2);border-radius:4px;overflow:hidden;max-width:260px;margin:8px auto 0}
.m-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#7f77dd);border-radius:4px;transition:width .4s ease}

/* Flashcard */
.card{
  background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);
  padding:30px 22px;min-height:210px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;cursor:pointer;user-select:none;position:relative;margin-bottom:14px;
  transition:border-color .2s;
}
.card:active{border-color:var(--accent)}
.interval-tag{
  position:absolute;top:12px;right:14px;font-size:11px;color:var(--text-faint);
  background:var(--surface-2);padding:3px 10px;border-radius:10px;font-weight:600;
}
.card-jp{font-size:48px;font-weight:700;letter-spacing:-0.01em;margin-bottom:8px}
.card-kana{font-size:17px;color:var(--text-dim)}
.card-meaning{font-size:23px;font-weight:600}
.card-ex{font-size:14px;color:var(--text-dim);max-width:320px;line-height:1.7;margin-top:4px}
.card-hint{position:absolute;bottom:12px;left:0;right:0;font-size:11px;color:var(--text-faint)}
.hidden{display:none!important}

.audio-btns{display:flex;gap:8px;margin-top:14px}
.audio-btn{
  padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;
  color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
  display:inline-flex;align-items:center;gap:5px;transition:all .15s;
}
.audio-btn:active{background:var(--surface-2)}

/* Rating */
.rate-prompt{font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:10px}
.rates{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
.rate{
  padding:14px 4px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:transparent;
  font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;line-height:1.5;transition:all .12s;
}
.rate .ico{font-size:18px;display:block;margin-bottom:3px}
.rate.q0{border-color:#5a3a44;color:#e89aa0}.rate.q0:active{background:#3a2228}
.rate.q1{border-color:#5a4a33;color:#e8c48a}.rate.q1:active{background:#3a3020}
.rate.q2{border-color:#3a5a3f;color:#9adba8}.rate.q2:active{background:#1f3a26}
.rate.q3{border-color:#33574d;color:#7fdcc4}.rate.q3:active{background:#1a3a32}

/* Empty state */
.empty{
  background:var(--surface);border-radius:var(--radius);padding:36px 22px;text-align:center;
}
.empty .big{font-size:38px;margin-bottom:10px}
.empty h3{font-size:17px;font-weight:600;margin-bottom:6px}
.empty p{font-size:13px;color:var(--text-dim)}

/* Quiz */
.quiz{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);padding:22px;margin-bottom:14px}
.quiz-badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px;margin-bottom:12px}
.quiz-badge.read{background:#2d2546;color:#b3a4ff}
.quiz-badge.listen{background:#1f3a32;color:#7fdcc4}
.quiz-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.quiz-q{font-size:26px;font-weight:700;text-align:center;margin-bottom:4px}
.quiz-sub{font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:16px}
.quiz-listen-instr{font-size:14px;color:var(--text-dim)}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.opt{
  padding:14px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;
  color:var(--text);font-size:14px;font-weight:500;cursor:pointer;text-align:left;font-family:inherit;
  transition:all .12s;min-height:50px;
}
.opt:active{background:var(--surface-2)}
.opt.correct{background:#1f3a26;border-color:#34c08a;color:#9adba8}
.opt.wrong{background:#3a2228;border-color:#e06363;color:#e89aa0}
.quiz-result{font-size:13px;color:var(--text-dim);text-align:center;min-height:18px;margin-top:12px}
.next{
  width:100%;margin-top:12px;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--surface-2);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;
}
.next:active{background:var(--border)}
.tip{background:var(--surface);border-radius:var(--radius-sm);padding:13px 15px;font-size:12px;color:var(--text-dim);line-height:1.7}

/* Meteor mode */
#meteor-area{flex:1;display:flex;flex-direction:column;min-height:0}
#m-field{flex:1;display:flex;flex-direction:column;min-height:0}
.m-hud{display:flex;gap:8px;margin-bottom:10px}
.m-hud-item{flex:1;background:var(--surface);border-radius:var(--radius-sm);padding:8px 4px;text-align:center}
.m-hud-item span{font-size:10px;color:var(--text-faint);letter-spacing:0.06em}
.m-hud-item b{display:block;font-size:20px;font-weight:700;color:var(--text);line-height:1;margin-top:3px}
.m-hud-item.combo b{color:var(--accent)}
.m-panel{flex:1;display:flex;flex-direction:column;background:linear-gradient(180deg,#140e1c,#241a2e);border:1px solid var(--border-soft);border-radius:var(--radius);padding:20px;text-align:center;overflow-y:auto}
.m-inner{margin:auto;width:100%;max-width:380px}
.m-panel .big{font-size:40px;margin-bottom:6px}
.m-panel h3{font-size:20px;font-weight:700;margin-bottom:8px}
.m-panel p{font-size:13px;color:var(--text-dim);line-height:1.6;max-width:340px;margin:0 auto 14px}
.m-play{padding:15px 40px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#1a1320;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.m-play:active{opacity:.85}
.m-toggle{margin-top:16px;background:none;border:1px solid var(--border);color:var(--text-dim);font-size:12px;font-weight:600;padding:7px 14px;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit}
.m-sky{position:relative;flex:1;min-height:200px;background:radial-gradient(ellipse at 50% 0%,#241a3a,#140e1c 70%);border:1px solid var(--border-soft);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.m-sky::before{content:"";position:absolute;inset:0;background-image:radial-gradient(1px 1px at 20% 30%,#fff,transparent),radial-gradient(1px 1px at 70% 20%,#cfc6ff,transparent),radial-gradient(1px 1px at 40% 60%,#fff,transparent),radial-gradient(1px 1px at 85% 70%,#cfc6ff,transparent),radial-gradient(1px 1px at 60% 85%,#fff,transparent);opacity:.5}
.m-meteor{position:absolute;top:0;left:50%;transform:translateX(-50%);background:var(--surface-2);border:1.5px solid var(--accent);border-radius:14px;padding:11px 18px;text-align:center;box-shadow:0 0 20px rgba(179,164,255,.28);will-change:top;min-width:92px}
.m-meteor.boom{animation:m-boom .4s ease forwards}
.m-meteor.crash{animation:m-crash .4s ease forwards}
@keyframes m-boom{to{transform:translateX(-50%) scale(1.7);opacity:0}}
@keyframes m-crash{to{transform:translateX(-50%) scale(.6) rotate(8deg);opacity:0}}
.m-jp{font-size:30px;font-weight:700;line-height:1.1}
.m-kana{font-size:13px;color:var(--text-dim);margin-top:2px}
.m-ground{position:absolute;left:0;right:0;bottom:0;height:4px;background:repeating-linear-gradient(90deg,var(--n2),var(--n2) 8px,transparent 8px,transparent 16px);opacity:.55}
.m-sky.flash{animation:m-flash .35s ease}
@keyframes m-flash{0%{box-shadow:inset 0 0 0 3px var(--n2)}100%{box-shadow:inset 0 0 0 0 transparent}}
.m-opts .opt{text-align:center;min-height:46px;display:flex;align-items:center;justify-content:center}
.m-stars{font-size:36px;letter-spacing:5px;margin-bottom:10px;color:#f5c451}
@media (prefers-reduced-motion:reduce){.m-meteor.boom,.m-meteor.crash,.m-sky.flash{animation-duration:.01s}}

/* Footer */
.foot{margin-top:24px;padding-top:16px;border-top:1px solid var(--border-soft);display:flex;justify-content:space-between;align-items:center}
.foot span{font-size:11px;color:var(--text-faint)}
.foot button{background:none;border:none;color:var(--text-faint);font-size:11px;text-decoration:underline;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div class="wrap">
  <div id="top-chrome">
    <div class="app-head">
      <div class="app-title">JLPT <span>Study</span></div>
      <div class="app-tag">🌠 meteor</div>
    </div>

    <div class="levels" id="levels">
      <button class="level on" data-level="N5" onclick="setLevel('N5')">N5</button>
      <button class="level" data-level="N4" onclick="setLevel('N4')">N4</button>
      <button class="level" data-level="N3" onclick="setLevel('N3')">N3</button>
      <button class="level" data-level="N2" onclick="setLevel('N2')">N2</button>
    </div>
  </div>

  <!-- Meteor Mode (full screen) -->
  <div id="meteor-area">
    <div id="m-start" class="m-panel">
      <div class="m-inner">
        <div class="big">🌠</div>
        <h3>Meteor Mode</h3>
        <p>落ちてくる日本語の意味を、着地する前にタップ。正解も不正解もそのまま復習スケジュールに反映されます。</p>
        <div class="cats" id="cats">
          <button class="cat on" data-cat="vocab" onclick="setCat('vocab')">Vocabulary</button>
          <button class="cat" data-cat="grammar" onclick="setCat('grammar')">Grammar</button>
          <button class="cat" data-cat="hiragana" onclick="setCat('hiragana')">Hiragana</button>
          <button class="cat" data-cat="kanji" onclick="setCat('kanji')">Kanji</button>
        </div>
        <div class="m-summary" id="m-summary"></div>
        <div class="m-prog-bar"><div class="m-prog-fill" id="m-prog-fill" style="width:0%"></div></div>
        <p style="margin:18px 0 0"><button class="m-play" onclick="startMeteor()">▶ スタート</button></p>
        <div><button class="m-toggle" id="m-sound" onclick="toggleSound()">🔊 Sound: On</button></div>
      </div>
    </div>

    <div id="m-field" class="hidden">
      <div class="m-hud">
        <div class="m-hud-item"><span>SCORE</span><b id="m-score">0</b></div>
        <div class="m-hud-item combo"><span>COMBO</span><b id="m-combo">0</b></div>
        <div class="m-hud-item"><span>BEST</span><b id="m-best">0</b></div>
      </div>
      <div class="m-sky" id="m-sky">
        <div class="m-meteor" id="m-meteor">
          <div class="m-jp" id="m-jp"></div>
          <div class="m-kana" id="m-kana"></div>
        </div>
        <div class="m-ground"></div>
      </div>
      <div class="opts m-opts" id="m-opts"></div>
    </div>

    <div id="m-result" class="m-panel hidden">
      <div class="m-inner">
        <div class="m-stars" id="m-stars">☆☆☆</div>
        <h3 id="m-result-title"></h3>
        <p id="m-result-sub"></p>
        <button class="m-play" onclick="startMeteor()">もう一度</button>
      </div>
    </div>
  </div>

  <div class="foot">
    <span>Progress saved on this device</span>
    <button onclick="resetAll()">Reset data</button>
  </div>
</div>

<script>
const DATA={
  N5:{
    vocab:[
      {id:'n5v1',jp:'水',kana:'みず',en:'water',ex:'水を飲みます。'},
      {id:'n5v2',jp:'食べる',kana:'たべる',en:'to eat',ex:'ご飯を食べます。'},
      {id:'n5v3',jp:'学校',kana:'がっこう',en:'school',ex:'学校に行きます。'},
      {id:'n5v4',jp:'大きい',kana:'おおきい',en:'big',ex:'この犬は大きいです。'},
      {id:'n5v5',jp:'友達',kana:'ともだち',en:'friend',ex:'友達と遊ぶ。'},
      {id:'n5v6',jp:'電話',kana:'でんわ',en:'telephone',ex:'電話します。'},
      {id:'n5v7',jp:'本',kana:'ほん',en:'book',ex:'本を読む。'},
      {id:'n5v8',jp:'見る',kana:'みる',en:'to see',ex:'テレビを見ます。'}
    ],
    grammar:[
      {id:'n5g1',jp:'〜は〜です',kana:'',en:'A is B',ex:'私は学生です。'},
      {id:'n5g2',jp:'〜が好きです',kana:'',en:'I like ~',ex:'寿司が好きです。'},
      {id:'n5g3',jp:'〜をください',kana:'',en:'Please give me ~',ex:'水をください。'},
      {id:'n5g4',jp:'〜に行きます',kana:'',en:'Go to ~',ex:'学校に行きます。'}
    ],
    hiragana:[
      {id:'n5h1',jp:'あ',kana:'a',en:'a',ex:'あめ = rain'},
      {id:'n5h2',jp:'い',kana:'i',en:'i',ex:'いぬ = dog'},
      {id:'n5h3',jp:'う',kana:'u',en:'u',ex:'うみ = sea'},
      {id:'n5h4',jp:'え',kana:'e',en:'e',ex:'えき = station'},
      {id:'n5h5',jp:'お',kana:'o',en:'o',ex:'おかあさん = mother'},
      {id:'n5h6',jp:'か',kana:'ka',en:'ka',ex:'かさ = umbrella'}
    ],
    kanji:[
      {id:'n5k1',jp:'日',kana:'にち・ひ',en:'sun / day',ex:'日本 = Japan'},
      {id:'n5k2',jp:'月',kana:'つき・げつ',en:'moon / month',ex:'今月 = this month'},
      {id:'n5k3',jp:'山',kana:'やま・さん',en:'mountain',ex:'富士山 = Mt. Fuji'},
      {id:'n5k4',jp:'川',kana:'かわ',en:'river',ex:'川を渡る。'},
      {id:'n5k5',jp:'人',kana:'ひと・じん',en:'person',ex:'日本人 = Japanese person'}
    ]
  },
  N4:{
    vocab:[
      {id:'n4v1',jp:'電車',kana:'でんしゃ',en:'train',ex:'電車で行きます。'},
      {id:'n4v2',jp:'運動',kana:'うんどう',en:'exercise',ex:'毎日運動します。'},
      {id:'n4v3',jp:'旅行',kana:'りょこう',en:'travel',ex:'旅行が好きです。'},
      {id:'n4v4',jp:'練習',kana:'れんしゅう',en:'practice',ex:'毎日練習します。'},
      {id:'n4v5',jp:'説明',kana:'せつめい',en:'explanation',ex:'説明してください。'}
    ],
    grammar:[
      {id:'n4g1',jp:'〜てから',kana:'',en:'After doing ~',ex:'食べてから行きます。'},
      {id:'n4g2',jp:'〜ながら',kana:'',en:'While doing ~',ex:'音楽を聞きながら勉強する。'},
      {id:'n4g3',jp:'〜たことがある',kana:'',en:'Have done ~ before',ex:'富士山に登ったことがある。'}
    ],
    hiragana:[
      {id:'n4h1',jp:'さ行',kana:'sa/shi/su/se/so',en:'sa-row',ex:'さくら = cherry blossom'},
      {id:'n4h2',jp:'た行',kana:'ta/chi/tsu/te/to',en:'ta-row',ex:'たべる = to eat'},
      {id:'n4h3',jp:'な行',kana:'na/ni/nu/ne/no',en:'na-row',ex:'なつ = summer'}
    ],
    kanji:[
      {id:'n4k1',jp:'東',kana:'ひがし・とう',en:'east',ex:'東京 = Tokyo'},
      {id:'n4k2',jp:'西',kana:'にし・せい',en:'west',ex:'関西 = Kansai'},
      {id:'n4k3',jp:'駅',kana:'えき',en:'station',ex:'駅に着きました。'}

  },
  N3:{
    vocab:[
      {id:'n3v1',jp:'影響',kana:'えいきょう',en:'influence',ex:'健康に影響する。'},
      {id:'n3v2',jp:'確認',kana:'かくにん',en:'confirmation',ex:'確認してください。'},
      {id:'n3v3',jp:'判断',kana:'はんだん',en:'judgment',ex:'自分で判断する。'},
      {id:'n3v4',jp:'可能',kana:'かのう',en:'possible',ex:'それは可能ですか？'}
    ],
    grammar:[
      {id:'n3g1',jp:'〜によって',kana:'',en:'Due to / Depending on',ex:'人によって違う。'},
      {id:'n3g2',jp:'〜に対して',kana:'',en:'Toward / Against',ex:'質問に対して答える。'},
      {id:'n3g3',jp:'〜わけではない',kana:'',en:'Not the case that ~',ex:'嫌いなわけではない。'}
    ],
    hiragana:[
      {id:'n3h1',jp:'は行',kana:'ha/hi/fu/he/ho',en:'ha-row',ex:'はな = flower'},
      {id:'n3h2',jp:'ま行',kana:'ma/mi/mu/me/mo',en:'ma-row',ex:'まつり = festival'}
    ],
    kanji:[
      {id:'n3k1',jp:'経済',kana:'けいざい',en:'economy',ex:'経済が回復している。'},
      {id:'n3k2',jp:'環境',kana:'かんきょう',en:'environment',ex:'環境問題は深刻だ。'},
      {id:'n3k3',jp:'社会',kana:'しゃかい',en:'society',ex:'社会に貢献する。'}
    ]
  },
  N2:{
    vocab:[
      {id:'n2v1',jp:'概念',kana:'がいねん',en:'concept',ex:'新しい概念を理解する。'},
      {id:'n2v2',jp:'把握',kana:'はあく',en:'grasp / comprehend',ex:'状況を把握する。'},
      {id:'n2v3',jp:'懸念',kana:'けねん',en:'concern',ex:'安全への懸念がある。'},
      {id:'n2v4',jp:'促進',kana:'そくしん',en:'promote',ex:'成長を促進する。'}
    ],
    grammar:[
      {id:'n2g1',jp:'〜に際して',kana:'',en:'On the occasion of',ex:'出発に際して確認する。'},
      {id:'n2g2',jp:'〜をもとに',kana:'',en:'Based on',ex:'データをもとに分析する。'},
      {id:'n2g3',jp:'〜かねない',kana:'',en:'Might possibly (negative)',ex:'失敗しかねない。'}
    ],
    hiragana:[
      {id:'n2h1',jp:'ゃゅょ（小文字）',kana:'ya/yu/yo small',en:'combined sounds',ex:'きゃ, しゅ, ちょ'},
      {id:'n2h2',jp:'っ',kana:'double consonant',en:'geminate stop',ex:'きって = stamp'}
    ],
    kanji:[
      {id:'n2k1',jp:'複雑',kana:'ふくざつ',en:'complex',ex:'複雑な問題だ。'},
      {id:'n2k2',jp:'曖昧',kana:'あいまい',en:'ambiguous',ex:'曖昧な表現を避ける。'},
      {id:'n2k3',jp:'矛盾',kana:'むじゅん',en:'contradiction',ex:'論理に矛盾がある。'}
    ]
  }
};

const STORE='jlpt-sr-v1';
const DAY=86400000;
let level='N5',cat='vocab';
let mem={};

/* ---- persistence ---- */
function load(){
  try{mem=JSON.parse(localStorage.getItem(STORE))||{};}catch(e){mem={};}
}
function save(){
  try{localStorage.setItem(STORE,JSON.stringify(mem));}catch(e){}
}
function rec(id){
  if(!mem[id]) mem[id]={iv:0,ef:2.5,due:Date.now()-1,reps:0};
  return mem[id];
}
function isDue(id){return rec(id).due<=Date.now();}

/* ---- SM-2 ---- */
function update(id,q){
  const c=rec(id);
  let ef=Math.max(1.3,c.ef+(0.1-(3-q)*(0.08+(3-q)*0.02)));
  let iv;
  if(q<2){iv=1;c.reps=0;}
  else{c.reps++;iv=c.reps===1?1:c.reps===2?3:Math.round(c.iv*ef);}
  c.ef=ef;c.iv=iv;c.due=Date.now()+iv*DAY;
  mem[id]=c;save();
}
/* ---- helpers ---- */
function cards(){return(DATA[level]&&DATA[level][cat])||[];}
function shuffle(a){return a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(p=>p[1]);}

function say(text,lang){
  if(!text||!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang;u.rate=0.85;
  speechSynthesis.speak(u);
}

/* ---- stats (start-screen summary) ---- */
function refreshStats(){
  const items=cards();
  const due=items.filter(i=>isDue(i.id)).length;
  const known=items.filter(i=>{const c=mem[i.id];return c&&c.reps>=3&&!isDue(i.id);}).length;
  const pct=items.length?Math.round(known/items.length*100):0;
  const st=(gdata.stars&&gdata.stars[gkey()])||0;
  const sEl=document.getElementById('m-summary');
  if(sEl)sEl.innerHTML='Due <b>'+due+'</b> · Mastered <b>'+known+'/'+items.length+'</b> · Best <b>'+bestScore()+
    '</b> <span class="stars">'+(st?'★'.repeat(st)+'☆'.repeat(3-st):'☆☆☆')+'</span>';
  const f=document.getElementById('m-prog-fill');
  if(f)f.style.width=pct+'%';
}

/* ---- navigation ---- */
function setLevel(l){
  level=l;
  document.querySelectorAll('.level').forEach(b=>b.classList.toggle('on',b.dataset.level===l));
  start();
}
function setCat(c){
  cat=c;
  document.querySelectorAll('.cat').forEach(b=>b.classList.toggle('on',b.dataset.cat===c));
  start();
}
function start(){
  stopMeteor();
  showMeteorStart();
  refreshStats();
}

/* ---- Meteor Mode ---- */
const GSTORE='jlpt-game-v1';
const ROUND=10;
let gdata={},soundOn=true;
let mActive=false,mRAF=0,mStart=0,mFallMs=6000;
let mItems=[],mIdx=0,mCur=null,mAnswered=false;
let mScore=0,mCombo=0,mCorrect=0,mTotal=0;
let actx=null;

function gload(){
  try{gdata=JSON.parse(localStorage.getItem(GSTORE))||{};}catch(e){gdata={};}
  if(typeof gdata.sound==='boolean')soundOn=gdata.sound;
}
function gsave(){try{gdata.sound=soundOn;localStorage.setItem(GSTORE,JSON.stringify(gdata));}catch(e){}}
function gkey(){return level+'/'+cat;}
function bestScore(){return(gdata.best&&gdata.best[gkey()])||0;}
function setBest(s,stars){
  if(!gdata.best)gdata.best={};
  if(s>(gdata.best[gkey()]||0))gdata.best[gkey()]=s;
  if(!gdata.stars)gdata.stars={};
  if(stars>(gdata.stars[gkey()]||0))gdata.stars[gkey()]=stars;
  gsave();
}

function updateSoundBtn(){
  const b=document.getElementById('m-sound');
  if(b)b.textContent=(soundOn?'🔊':'🔈')+' Sound: '+(soundOn?'On':'Off');
}
function toggleSound(){soundOn=!soundOn;gsave();updateSoundBtn();}

function showMeteorStart(){
  stopMeteor();
  document.body.classList.remove('playing');
  document.getElementById('m-field').classList.add('hidden');
  document.getElementById('m-result').classList.add('hidden');
  document.getElementById('m-start').classList.remove('hidden');
  document.getElementById('m-best').textContent=bestScore();
  updateSoundBtn();
  refreshStats();
}

function startMeteor(){
  const pool=cards();
  if(pool.length<1)return;
  document.body.classList.add('playing');
  const ordered=[...pool.filter(i=>isDue(i.id)).sort((a,b)=>rec(a.id).due-rec(b.id).due),
                 ...pool.filter(i=>!isDue(i.id))];
  mItems=ordered.slice(0,Math.min(ROUND,ordered.length));
  mIdx=0;mScore=0;mCombo=0;mCorrect=0;mTotal=mItems.length;
  document.getElementById('m-start').classList.add('hidden');
  document.getElementById('m-result').classList.add('hidden');
  document.getElementById('m-field').classList.remove('hidden');
  document.getElementById('m-score').textContent='0';
  document.getElementById('m-combo').textContent='0';
  document.getElementById('m-best').textContent=bestScore();
  mActive=true;
  spawnMeteor();
}

function spawnMeteor(){
  if(!mActive)return;
  if(mIdx>=mItems.length){endMeteor();return;}
  mCur=mItems[mIdx];mAnswered=false;mStart=0;
  mFallMs=Math.max(2600,6000-mIdx*250-mCombo*120);
  const m=document.getElementById('m-meteor');
  m.className='m-meteor';m.style.top='0px';
  document.getElementById('m-jp').textContent=mCur.jp;
  document.getElementById('m-kana').textContent=mCur.kana||'';
  buildMeteorOpts(mCur);
  if(soundOn)say(mCur.jp,'ja-JP');
  mRAF=requestAnimationFrame(mLoop);
}

function buildMeteorOpts(item){
  const c=document.getElementById('m-opts');
  c.innerHTML='';
  const opts=shuffle([item,...shuffle(cards().filter(x=>x.id!==item.id)).slice(0,3)]);
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='opt';b.textContent=o.en;
    b.onclick=()=>meteorAnswer(b,o.id===item.id);
    c.appendChild(b);
  });
}

function mLoop(ts){
  if(!mActive)return;
  if(!mStart)mStart=ts;
  const sky=document.getElementById('m-sky');
  const m=document.getElementById('m-meteor');
  const maxY=sky.clientHeight-m.offsetHeight-8;
  const p=(ts-mStart)/mFallMs;
  m.style.top=Math.min(maxY,p*maxY)+'px';
  if(p>=1){meteorMiss();return;}
  mRAF=requestAnimationFrame(mLoop);
}

function meteorAnswer(btn,ok){
  if(mAnswered||!mActive)return;mAnswered=true;
  cancelAnimationFrame(mRAF);
  const opts=document.getElementById('m-opts');
  opts.querySelectorAll('button').forEach(b=>b.onclick=null);
  if(ok){
    const m=document.getElementById('m-meteor');
    const sky=document.getElementById('m-sky');
    const maxY=sky.clientHeight-m.offsetHeight-8;
    const top=parseFloat(m.style.top)||0;
    const speed=maxY?1-top/maxY:1;       /* caught early -> closer to 1 */
    btn.classList.add('correct');
    m.classList.add('boom');
    mCorrect++;mCombo++;
    mScore+=10+Math.round(speed*10)+(mCombo-1)*5;
    update(mCur.id,speed>0.5?3:2);
    if(soundOn)blip(660);
  }else{
    btn.classList.add('wrong');
    opts.querySelectorAll('button').forEach(b=>{if(b.textContent===mCur.en)b.classList.add('correct');});
    failMeteor();
  }
  document.getElementById('m-score').textContent=mScore;
  document.getElementById('m-combo').textContent=mCombo;
  mIdx++;
  setTimeout(spawnMeteor,750);
}

function meteorMiss(){
  if(mAnswered||!mActive)return;mAnswered=true;
  const opts=document.getElementById('m-opts');
  opts.querySelectorAll('button').forEach(b=>{b.onclick=null;if(b.textContent===mCur.en)b.classList.add('correct');});
  document.getElementById('m-meteor').classList.add('crash');
  failMeteor();
  document.getElementById('m-combo').textContent=mCombo;
  mIdx++;
  setTimeout(spawnMeteor,750);
}

function failMeteor(){
  mCombo=0;
  update(mCur.id,0);
  const sky=document.getElementById('m-sky');
  sky.classList.remove('flash');void sky.offsetWidth;sky.classList.add('flash');
  if(soundOn)blip(150);
}

function endMeteor(){
  mActive=false;cancelAnimationFrame(mRAF);
  document.body.classList.remove('playing');
  const acc=mTotal?mCorrect/mTotal:0;
  const stars=acc>=0.9?3:acc>=0.7?2:acc>=0.4?1:0;
  setBest(mScore,stars);
  document.getElementById('m-field').classList.add('hidden');
  document.getElementById('m-result').classList.remove('hidden');
  document.getElementById('m-stars').textContent='★'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('m-result-title').textContent=mCorrect+' / '+mTotal+' correct';
  document.getElementById('m-result-sub').textContent='Score '+mScore+' · Best '+bestScore()+'. '+
    (stars>=3?'完璧！この調子で次のレベルへ。':stars>=2?'good。あと一歩で完璧。':stars>=1?'間違えた語はまた早めに出てきます。':'落ち着いてもう一度。');
  document.getElementById('m-best').textContent=bestScore();
  refreshStats();
}

function stopMeteor(){mActive=false;cancelAnimationFrame(mRAF);}

function blip(freq){
  if(!soundOn)return;
  try{
    actx=actx||new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='triangle';o.frequency.value=freq;
    o.connect(g);g.connect(actx.destination);
    g.gain.setValueAtTime(.12,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.18);
    o.start();o.stop(actx.currentTime+.2);
  }catch(e){}
}

/* ---- reset ---- */
function resetAll(){
  if(!confirm('Reset all study progress on this device?'))return;
  mem={};try{localStorage.removeItem(STORE);}catch(e){}
  start();
}

/* ---- boot ---- */
load();gload();start();
</script>
